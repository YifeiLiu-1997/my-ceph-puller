name: Build_Ceph_Fixed_Ultimate
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Custom Ceph Image
        run: |
          echo "========= 1. 拉取基础镜像 ========="
          docker pull --platform linux/arm64 openeuler/openeuler:24.03-lts
          
          echo "========= 2. 启动构建容器 ========="
          docker run -d --name builder --platform linux/arm64 openeuler/openeuler:24.03-lts sleep 3600
          
          echo "========= 3. 安装 Ceph 全家桶 (补齐缺失组件) ========="
          # 显式添加了以下包：
          # ceph-exporter: 解决你之前 node3 找不到指令的问题
          # ceph-fuse: 提供挂载支持
          # ceph-immutable-object-cache: 提供不可变对象缓存
          # ceph-common: 包含大部分辅助工具
          docker exec builder dnf update -y
          docker exec builder dnf install -y \
            ceph \
            ceph-osd \
            ceph-mon \
            ceph-mgr \
            ceph-volume \
            ceph-common \
            ceph-exporter \
            ceph-fuse \
            ceph-immutable-object-cache \
            systemd \
            udev \
            lvm2 \
            smartmontools \
            procps-ng \
            e2fsprogs \
            which

          echo "========= 4. 深度验货 (确保所有指令存在) ========="
          # 验证你特别要求的几个关键指令
          docker exec builder which ceph-exporter
          docker exec builder which ceph-fuse
          docker exec builder which ceph-immutable-object-cache
          docker exec builder which ceph-conf
          
          echo "========= 5. 打包镜像 ========="
          docker commit builder ceph-18.2.2-fixed-64k:latest
          docker save ceph-18.2.2-fixed-64k:latest | gzip > ceph_fixed_64k.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ceph-fixed-package
          path: ceph_fixed_64k.tar.gz
